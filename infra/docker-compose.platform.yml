services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketing_mvp
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketing_mvp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.api
    env_file: [../.env]
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "gateway.app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 6

  worker:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.worker
    env_file: [../.env]
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: ["python", "-m", "celery", "-A", "workers.celery_app.celery_app", "worker", "-l", "info"]
    healthcheck:
      test: ["CMD", "python", "-m", "celery", "-A", "workers.celery_app.celery_app", "inspect", "ping"]
      interval: 20s
      timeout: 10s
      retries: 5

  go-publisher:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.go-publisher
    ports: ["8088:8088"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8088/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
