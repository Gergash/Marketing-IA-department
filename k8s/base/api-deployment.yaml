apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: marketing-depa
spec:
  replicas: 2
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
    spec:
      containers:
        - name: api
          image: marketing-depa/api:latest
          ports: [{containerPort: 8000}]
          envFrom:
            - configMapRef: { name: marketing-config }
            - secretRef: { name: marketing-secrets }
          readinessProbe:
            httpGet: { path: /api/health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health/background, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: marketing-depa
spec:
  selector: { app: api }
  ports:
    - port: 8000
      targetPort: 8000
